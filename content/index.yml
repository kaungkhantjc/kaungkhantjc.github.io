about:
  title: "About Me"
  description: |
    As a passionate and product-focused engineer with over 7 years of experience in native Android app development and 6+ years in web technologies, I specialize in creating secure, high-performance Android apps using Java, Kotlin, and modern tools like Jetpack Compose, while also building robust web solutions with Laravel, Node.js, and serverless architectures. I love solving real-world problems, as seen in my projects like ADB Remote.
